<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MØVÏE LØVERZ</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

html{
scroll-behavior:smooth;
}

body{
background:url("https://i.ibb.co/HTXDdshk/photo-2026-03-02-20-57-03-7612765236499578904.jpg") no-repeat center center fixed;
background-size:cover;
color:white;
overflow-x:hidden;
}

/* Animated Gradient Overlay */
body::before{
content:"";
position:fixed;
width:100%;
height:100%;
background:linear-gradient(45deg, rgba(0,0,0,0.6), rgba(229,9,20,0.25), rgba(0,0,0,0.6));
background-size:400% 400%;
animation:gradientMove 12s ease infinite;
z-index:-1;
}

@keyframes gradientMove{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

/* 🎬 PREMIUM CINEMATIC LOADER */

#loader{
position:fixed;
width:100%;
height:100%;
background:black;
display:flex;
justify-content:center;
align-items:center;
z-index:9999;
overflow:hidden;
animation:loaderFade 1.2s ease 4.5s forwards;
}

.loader-text{
font-size:clamp(26px,6vw,44px);
letter-spacing:6px;
color:#e50914;
white-space:nowrap;   /* 🔥 Force single line */
animation:dramaticZoom 4.5s ease forwards;
text-shadow:0 0 10px #e50914;
}

@keyframes dramaticZoom{
0%{
transform:scale(0.5);
opacity:0;
filter:blur(15px);
text-shadow:0 0 0px #e50914;
}
40%{
opacity:1;
filter:blur(0px);
}
70%{
transform:scale(1.05);
text-shadow:0 0 25px #ff1e2d, 0 0 40px #e50914;
}
100%{
transform:scale(1.25);
opacity:0;
filter:blur(4px);
}
}

@keyframes loaderFade{
to{
opacity:0;
visibility:hidden;
}
}

/* Header */
.header{
text-align:center;
padding:30px 15px;
animation:fadeIn 1.5s ease forwards;
}

.header h1{
font-size:18px;
opacity:0.9;
}

.header h2{
font-size:32px;
color:#e50914;
letter-spacing:3px;
text-shadow:0 0 15px rgba(0,0,0,0.8);
}

@keyframes fadeIn{
from{opacity:0;transform:translateY(-20px);}
to{opacity:1;transform:translateY(0);}
}

.container{
max-width:420px;
margin:auto;
padding:10px;
}

.card{
margin-bottom:35px;
opacity:0;
transform:translateY(40px);
transition:0.6s ease;
}

.card.show{
opacity:1;
transform:translateY(0);
}

.image-box{
position:relative;
height:210px;
border-radius:20px;
overflow:hidden;
box-shadow:0 10px 30px rgba(0,0,0,0.7);
cursor:pointer;
transition:0.4s ease;
}

.image-box:hover{
transform:scale(1.05);
}

.image-box img{
width:100%;
height:100%;
object-fit:cover;
transition:0.6s ease;
}

.image-box:hover img{
transform:scale(1.1);
}

.image-box::after{
content:"";
position:absolute;
bottom:0;
width:100%;
height:70%;
background:linear-gradient(to top, rgba(0,0,0,0.9), transparent);
}

.join-btn{
position:absolute;
bottom:15px;
right:15px;
background:#e50914;
padding:6px 14px;
border-radius:4px;
font-size:13px;
font-weight:bold;
transition:0.3s;
}

.join-btn:hover{
background:#ff1e2d;
box-shadow:0 0 12px #e50914;
}

.channel-name{
margin-top:12px;
font-weight:bold;
font-size:17px;
text-align:center;
position:relative;
display:inline-block;
left:50%;
transform:translateX(-50%);
text-shadow:0 4px 15px rgba(0,0,0,0.9);
transition:0.3s;
}

.channel-name::after{
content:"";
position:absolute;
left:0;
bottom:-4px;
width:0%;
height:2px;
background:#e50914;
transition:0.4s ease;
}

.card:hover .channel-name::after{
width:100%;
}

.card:hover .channel-name{
color:#ff2e3c;
}

/* Premium Glass Footer */
.footer{
margin:50px 15px 40px;
padding:20px;
text-align:center;
border-radius:20px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(10px);
box-shadow:0 10px 30px rgba(0,0,0,0.7);
}

.footer-text{
margin-top:15px;
font-size:15px;
opacity:0.9;
letter-spacing:1px;
}

.share-btn{
padding:10px 25px;
background:#e50914;
border:none;
border-radius:6px;
color:white;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

.share-btn:hover{
background:#ff1e2d;
box-shadow:0 0 15px #e50914;
}
</style>
</head>

<body>

<!-- 🎬 Cinematic Loader -->
<div id="loader">
<div class="loader-text">𝐌Ø𝐕Ï𝐄 𝐋Ø𝐕𝐄𝐑𝐙</div>
</div>

<div class="header">
<h1>Join And Support Our Channels</h1>
<h2>MØVÏE LØVERZ</h2>
</div>

<div class="container"></div>

<div class="footer">
<button class="share-btn" onclick="sharePage()">Share Now</button>
<div class="footer-text">Share And Support Us ❤️</div>
</div>

<script>

const channels = [
{type:"public", link:"VVNFUk5BTUUx", name:"Telugu HD Movies & Web Series", img:"https://i.ibb.co/rfKSX1HW/photo1.jpg"},
{type:"public", link:"VVNFUk5BTUUy", name:"Telugu Dubbed Movies Channel", img:"https://i.ibb.co/Tqt7yzCg/photo2.jpg"},
{type:"private", link:"aHR0cHM6Ly90Lm1lLytJTlZJVEUx", name:"Hall Print Movies Channel 🎬", img:"https://i.ibb.co/QBs8VgQ/photo3.jpg"},
{type:"public", link:"VVNFUk5BTUU0", name:"All Marvel Movies & Series", img:"https://i.ibb.co/jZTBLpK2/photo4.jpg"},
{type:"private", link:"aHR0cHM6Ly90Lm1lLytJTlZJVEUy", name:"OTT Updates & Film Updates", img:"https://i.ibb.co/rfKSX1HW/photo5.jpg"},
{type:"public", link:"VVNFUk5BTUU2", name:"Heart Beat Season 1 & 2", img:"https://i.ibb.co/Tqt7yzCg/photo6.jpg"},
{type:"public", link:"VVNFUk5BTUU3", name:"Amazon & Flipkart Best Loot Deals", img:"https://i.ibb.co/QBs8VgQ/photo7.jpg"},
{type:"private", link:"aHR0cHM6Ly90Lm1lLytJTlZJVEUz", name:"Our Main Channel 💥", img:"https://i.ibb.co/jZTBLpK2/photo8.jpg"},
{type:"public", link:"VVNFUk5BTUU5", name:"Movies Request Group ⚡️", img:"https://i.ibb.co/rfKSX1HW/photo9.jpg"},
{type:"public", link:"VVNFUk5BTUUxMA==", name:"Movies Search Bot", img:"https://i.ibb.co/Tqt7yzCg/photo10.jpg"},
{type:"private", link:"aHR0cHM6Ly90Lm1lLytJTlZJVEU0", name:"Movies Search Bot 2.0", img:"https://i.ibb.co/QBs8VgQ/photo11.jpg"},
{type:"public", link:"VVNFUk5BTUUxMg==", name:"File To Link Bot 1", img:"https://i.ibb.co/jZTBLpK2/photo12.jpg"},
{type:"private", link:"aHR0cHM6Ly90Lm1lLytJTlZJVEU1", name:"File To Link Bot 2", img:"https://i.ibb.co/rfKSX1HW/photo13.jpg"}
];

const container=document.querySelector(".container");

channels.forEach(c=>{
container.innerHTML+=`
<div class="card">
<div class="image-box" onclick="openTelegram('${c.type}','${c.link}')">
<img src="${c.img}" loading="lazy">
<div class="join-btn">Join Now</div>
</div>
<div class="channel-name">${c.name}</div>
</div>`;
});

const observer=new IntersectionObserver(entries=>{
entries.forEach(entry=>{
if(entry.isIntersecting){
entry.target.classList.add("show");
}
});
},{threshold:0.2});

document.querySelectorAll(".card").forEach(card=>{
observer.observe(card);
});

function openTelegram(type, encoded){
let decoded=atob(encoded);
if(type==="public"){
window.location="tg://resolve?domain="+decoded;
setTimeout(()=>{window.location="https://t.me/"+decoded;},800);
}else{
window.location=decoded;
}
}

function sharePage(){
if(navigator.share){
navigator.share({
title:"MØVÏE LØVERZ Channels",
text:"Join And Support Our Channels ❤️",
url:window.location.href
});
}else{
alert("Copy Link: "+window.location.href);
}
}

</script>

</body>
</html>
